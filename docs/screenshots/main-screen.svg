<svg xmlns="http://www.w3.org/2000/svg" width="360" height="780" viewBox="0 0 360 780" role="img" aria-label="LiteACR main screen preview">
  <rect width="360" height="780" rx="36" fill="#0f172a"/>
  <rect x="18" y="18" width="324" height="744" rx="28" fill="#f8fafc"/>
  <text x="38" y="64" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">LiteACR</text>
  <rect x="30" y="92" width="300" height="126" rx="22" fill="#e2e8f0"/>
  <text x="48" y="126" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Simple audio recorder</text>
  <text x="48" y="154" font-family="Arial, sans-serif" font-size="13" fill="#475569">Manual recording with a foreground</text>
  <text x="48" y="174" font-family="Arial, sans-serif" font-size="13" fill="#475569">notification and local playback list.</text>
  <text x="30" y="252" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">Permissions ready for recording.</text>
  <rect x="30" y="272" width="154" height="46" rx="23" fill="#2563eb"/>
  <text x="52" y="301" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Grant permissions</text>
  <text x="30" y="356" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Recorder idle</text>
  <rect x="30" y="388" width="190" height="54" rx="27" fill="#2563eb"/>
  <text x="78" y="421" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Start recording</text>
  <rect x="234" y="388" width="96" height="54" rx="27" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="268" y="421" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#334155">Pause</text>
  <rect x="30" y="472" width="300" height="184" rx="22" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
  <text x="48" y="510" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Save location</text>
  <text x="48" y="542" font-family="Arial, sans-serif" font-size="14" fill="#475569">Folder: Music/LiteACR</text>
  <text x="48" y="570" font-family="Arial, sans-serif" font-size="14" fill="#475569">2 recording(s) saved</text>
  <rect x="48" y="596" width="184" height="44" rx="22" fill="#2563eb"/>
  <text x="78" y="624" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Open recordings list</text>
</svg>
